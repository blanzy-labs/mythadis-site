<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Mythadis social sharing card</title>
	<desc id="desc">A luminous archive style Mythadis card with the line Evidence before legend.</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#06151b"/>
			<stop offset="0.58" stop-color="#02070a"/>
			<stop offset="1" stop-color="#0a161c"/>
		</linearGradient>
		<linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#42d9ff" stop-opacity="0"/>
			<stop offset="0.45" stop-color="#42d9ff"/>
			<stop offset="1" stop-color="#8cf0cd" stop-opacity="0.72"/>
		</linearGradient>
		<filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
			<feGaussianBlur stdDeviation="10" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)"/>
	<path d="M126 110H1074M126 520H1074M164 78V552M1036 78V552" fill="none" stroke="#99dcf0" stroke-opacity="0.14"/>
	<path d="M180 430L330 226L486 338L642 168L826 386L1012 248" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
	<path d="M210 448H440L520 334H716L800 236H1014" fill="none" stroke="#8cf0cd" stroke-opacity="0.42" stroke-width="3"/>
	<g fill="#42d9ff" stroke="#f4fbff" stroke-opacity="0.75">
		<rect x="166" y="416" width="32" height="32" transform="rotate(45 182 432)"/>
		<rect x="314" y="210" width="32" height="32" transform="rotate(45 330 226)"/>
		<rect x="470" y="322" width="32" height="32" transform="rotate(45 486 338)"/>
		<rect x="626" y="152" width="32" height="32" transform="rotate(45 642 168)"/>
		<rect x="810" y="370" width="32" height="32" transform="rotate(45 826 386)"/>
		<rect x="996" y="232" width="32" height="32" transform="rotate(45 1012 248)"/>
	</g>
	<text x="118" y="154" fill="#8cf0cd" font-family="IBM Plex Mono, Consolas, monospace" font-size="22" letter-spacing="3">PUBLIC RECORD / MYTHADIS</text>
	<text x="118" y="304" fill="#f4fbff" font-family="Space Grotesk, Arial, sans-serif" font-size="92" font-weight="700">Mythadis</text>
	<rect x="112" y="326" width="980" height="66" fill="#02070a" fill-opacity="0.76"/>
	<text x="124" y="372" fill="#c4d7df" font-family="Inter, Arial, sans-serif" font-size="34">Mythadis exists to coordinate intelligence—not just computation.</text>
	<text x="118" y="490" fill="#42d9ff" font-family="IBM Plex Mono, Consolas, monospace" font-size="24" letter-spacing="4">EVIDENCE BEFORE LEGEND</text>
</svg>
